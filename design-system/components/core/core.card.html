<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    body { background: var(--bg-base); padding: 24px 28px; margin: 0; }
    .lbl { font-family: var(--font-sans); font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
           text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px; }
    .sec { margin-bottom: 22px; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    hr { border: none; border-top: 1px solid var(--border-subtle); margin: 4px 0 20px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Badge, Avatar } = window.SophIADesignSystem_67e1f4;

    function Demo() {
      return (
        <div>
          <div className="sec">
            <div className="lbl">Button — variantes</div>
            <div className="row">
              <Button variant="primary">Explorar recursos</Button>
              <Button variant="secondary">Agregar material</Button>
              <Button variant="ghost">Cancelar</Button>
              <Button variant="text">Ver más</Button>
              <Button variant="primary" disabled>Deshabilitado</Button>
            </div>
          </div>
          <div className="sec">
            <div className="lbl">Button — tamaños</div>
            <div className="row">
              <Button variant="ghost" size="sm">Pequeño</Button>
              <Button variant="ghost" size="md">Mediano</Button>
              <Button variant="ghost" size="lg">Grande</Button>
            </div>
          </div>
          <hr />
          <div className="sec">
            <div className="lbl">Badge — variantes</div>
            <div className="row">
              <Badge variant="theme">amor</Badge>
              <Badge variant="theme">ética</Badge>
              <Badge variant="theme">libertad</Badge>
              <Badge variant="period">Antigua</Badge>
              <Badge variant="period">Moderna</Badge>
              <Badge variant="resource">PDF</Badge>
              <Badge variant="resource">Video</Badge>
              <Badge variant="resource">Reel</Badge>
              <Badge variant="neutral">428–348 a.C.</Badge>
              <Badge variant="solid">Nuevo</Badge>
            </div>
          </div>
          <div className="sec">
            <div className="lbl">Badge — tamaños</div>
            <div className="row">
              <Badge variant="theme" size="sm">sm · amor</Badge>
              <Badge variant="theme" size="md">md · ética</Badge>
              <Badge variant="theme" size="lg">lg · libertad</Badge>
            </div>
          </div>
          <hr />
          <div className="sec" style={{marginBottom:0}}>
            <div className="lbl">Avatar — tamaños e iniciales</div>
            <div className="row">
              <Avatar name="Platón" size="sm" />
              <Avatar name="Hannah Arendt" size="md" />
              <Avatar name="Immanuel Kant" size="lg" />
              <Avatar name="Marco Aurelio" size="xl" />
              <div style={{marginLeft:8,display:'flex',flexDirection:'column',gap:2}}>
                <span style={{fontFamily:'var(--font-sans)',fontSize:11,color:'var(--text-tertiary)'}}>sm · md · lg · xl</span>
                <span style={{fontFamily:'var(--font-sans)',fontSize:11,color:'var(--text-tertiary)'}}>Iniciales en Fraunces serif</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
