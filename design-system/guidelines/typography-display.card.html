<!-- @dsCard group="Type" viewport="700x320" name="Display — Fraunces" subtitle="Variable serif for headings, titles, and the brand wordmark" -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { background: var(--bg-base); padding: 24px 32px; }
    .specimen { margin-bottom: 18px; display: flex; align-items: baseline; gap: 16px; }
    .meta { font-family: var(--font-sans); font-size: 10px; color: var(--text-tertiary);
            white-space: nowrap; min-width: 130px; line-height: 1.4; }
    .divider { height: 1px; background: var(--border-subtle); margin: 16px 0; }
    .serif { font-family: var(--font-serif); color: var(--text-primary); line-height: var(--leading-tight); }
  </style>
</head>
<body>
  <div class="specimen">
    <div class="meta">72px · Black · opsz 72</div>
    <div class="serif" style="font-size:60px;font-weight:900;font-variation-settings:'opsz' 72">sophía</div>
  </div>
  <div class="divider"></div>
  <div class="specimen">
    <div class="meta">36px · Bold</div>
    <div class="serif" style="font-size:36px;font-weight:700">La pregunta que funda la filosofía</div>
  </div>
  <div class="specimen">
    <div class="meta">28px · SemiBold</div>
    <div class="serif" style="font-size:28px;font-weight:600">Ética a Nicómaco · Libro I</div>
  </div>
  <div class="specimen">
    <div class="meta">22px · Medium · Italic</div>
    <div class="serif" style="font-size:22px;font-weight:500;font-style:italic">«El conocimiento que verdaderamente libera»</div>
  </div>
  <div class="specimen">
    <div class="meta">18px · Regular</div>
    <div class="serif" style="font-size:18px;font-weight:400">Platón · Aristóteles · Kant · Arendt</div>
  </div>
  <div class="divider"></div>
  <div style="display:flex;gap:32px">
    <div class="specimen" style="margin:0">
      <div class="meta">Wordmark</div>
      <div class="serif" style="font-size:32px;font-weight:700">soph<span style="color:var(--accent-primary)">IA</span></div>
    </div>
    <div class="specimen" style="margin:0;align-items:center">
      <div class="meta">Semibold italic</div>
      <div class="serif" style="font-size:20px;font-weight:600;font-style:italic;color:var(--text-secondary)">Filosofía antigua</div>
    </div>
  </div>
</body>
</html>
