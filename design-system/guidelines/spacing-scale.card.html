<!-- @dsCard group="Spacing" viewport="700x260" name="Spacing Scale" subtitle="4px-base spacing tokens — from gap-xs to gap-xl" -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { background: var(--bg-base); padding: 24px 28px; font-family: var(--font-sans); }
    .row { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .block-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .block { background: var(--accent-primary); border-radius: 2px; width: 24px; }
    .token { font-size: 9px; color: var(--text-tertiary); text-align: center; font-weight: 600; }
    .px { font-size: 9px; color: var(--text-secondary); text-align: center; }
    .divider { height: 1px; background: var(--border-subtle); margin: 4px 0 16px; }
    .radius-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .radius-block {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .radius-box {
      width: 48px; height: 48px; background: var(--color-terracotta-100);
      border: 2px solid var(--accent-primary);
    }
    .group-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-tertiary); margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="group-label">Escala de espaciado</div>
  <div class="row">
    <div class="block-wrap"><div class="block" style="height:4px"></div><div class="token">--space-1</div><div class="px">4px</div></div>
    <div class="block-wrap"><div class="block" style="height:8px"></div><div class="token">--space-2</div><div class="px">8px</div></div>
    <div class="block-wrap"><div class="block" style="height:12px"></div><div class="token">--space-3</div><div class="px">12px</div></div>
    <div class="block-wrap"><div class="block" style="height:16px"></div><div class="token">--space-4</div><div class="px">16px</div></div>
    <div class="block-wrap"><div class="block" style="height:20px"></div><div class="token">--space-5</div><div class="px">20px</div></div>
    <div class="block-wrap"><div class="block" style="height:24px"></div><div class="token">--space-6</div><div class="px">24px</div></div>
    <div class="block-wrap"><div class="block" style="height:32px"></div><div class="token">--space-8</div><div class="px">32px</div></div>
    <div class="block-wrap"><div class="block" style="height:40px"></div><div class="token">--space-10</div><div class="px">40px</div></div>
    <div class="block-wrap"><div class="block" style="height:48px"></div><div class="token">--space-12</div><div class="px">48px</div></div>
    <div class="block-wrap"><div class="block" style="height:64px"></div><div class="token">--space-16</div><div class="px">64px</div></div>
  </div>

  <div class="divider"></div>
  <div class="group-label">Border radius</div>
  <div class="radius-row">
    <div class="radius-block"><div class="radius-box" style="border-radius:0"></div><div class="token">none · 0</div></div>
    <div class="radius-block"><div class="radius-box" style="border-radius:2px"></div><div class="token">xs · 2px</div></div>
    <div class="radius-block"><div class="radius-box" style="border-radius:4px"></div><div class="token">sm · 4px</div></div>
    <div class="radius-block"><div class="radius-box" style="border-radius:6px"></div><div class="token">md · 6px</div></div>
    <div class="radius-block"><div class="radius-box" style="border-radius:10px"></div><div class="token">lg · 10px</div></div>
    <div class="radius-block"><div class="radius-box" style="border-radius:16px"></div><div class="token">xl · 16px</div></div>
    <div class="radius-block"><div class="radius-box" style="border-radius:9999px"></div><div class="token">full · pill</div></div>
  </div>
</body>
</html>
